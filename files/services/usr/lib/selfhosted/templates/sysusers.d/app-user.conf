# Declarative creation of the admin user (bootc-preferred over useradd; created
# by systemd-sysusers early at boot, before tmpfiles materializes the home dir).
# Format: u <name> <uid[:gid]> "<gecos>" <home> <shell> [<password-hash>]
# This file is written at runtime by selfhosted-configure from a template;
# @@TOKEN@@ placeholders are substituted from /etc/selfhosted/config.env.
u @@APP_USER@@ 1000 "@@APP_USER@@" /var/home/@@APP_USER@@ /bin/bash @@APP_PASSWORD_HASH@@
# Add the user to wheel for sudo.
m @@APP_USER@@ wheel
