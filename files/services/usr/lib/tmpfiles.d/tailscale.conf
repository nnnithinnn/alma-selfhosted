# Persistent state dir for the Tailscale bootstrap hand-off.
# In bootc/ostree, directories under /var must be (re)created via tmpfiles.d,
# because /var is machine-local state and is not populated from the image tree.
#
# Owned by the app user @@APP_USER@@: the rootless tailscale-authkey-init user
# service writes authkey.env here. The rootful tailscale.service / .path read it
# as root (which bypasses the 0700 mode), so no group/other access is needed.
d /var/lib/tailscale-bootstrap 0700 @@APP_USER@@ @@APP_USER@@ - -
