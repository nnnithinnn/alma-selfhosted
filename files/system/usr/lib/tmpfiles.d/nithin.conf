# bootc keeps only /var persistent and wipes it of build-time content, so the
# admin user's home dir and the systemd linger marker must be (re)created on
# first boot rather than baked into the image.

# Home directory (base /var/home is provided by the bootc image).
d /var/home/nithin 0700 nithin nithin - -

# Enable systemd user-linger for nithin so the rootless container stack starts
# at boot without an interactive login. (loginctl enable-linger writes exactly
# this file; we create it declaratively since /var/lib is ephemeral.)
d /var/lib/systemd/linger 0755 root root - -
f /var/lib/systemd/linger/nithin 0644 root root - -
