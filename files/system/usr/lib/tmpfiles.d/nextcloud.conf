# Persistent directories on the OS disk's /var.
# In bootc/ostree, directories under /var must be (re)created via tmpfiles.d,
# because /var is machine-local state and is not populated from the image tree.

# Mountpoint for the dedicated 2 TB Nextcloud data disk.
d /var/mnt          0755 root root - -
d /var/mnt/nextcloud 0755 root root - -
