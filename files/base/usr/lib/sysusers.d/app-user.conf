# Declarative creation of the admin user (bootc-preferred over useradd; created
# by systemd-sysusers early at boot, before tmpfiles materializes the home dir).
# Format: u <name> <uid[:gid]> "<gecos>" <home> <shell>
# Password is left locked (key-only SSH); sudo is granted via /etc/sudoers.d.
# The login name comes from APP_USER in config.env (substituted at build time).
u @@APP_USER@@ 1000 "@@APP_USER@@" /var/home/@@APP_USER@@ /bin/bash
# Add the user to wheel for sudo.
m @@APP_USER@@ wheel
