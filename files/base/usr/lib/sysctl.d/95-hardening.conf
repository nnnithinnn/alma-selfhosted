# Kernel hardening for a single-purpose internet-facing server.
#
# rp_filter=2 (loose reverse-path filtering) is REQUIRED for the Tailscale exit
# node: strict mode (=1) drops packets whose return path differs from the
# incoming interface, which is exactly what exit-node NAT produces. Loose mode
# accepts the packet as long as any route to the source exists.
net.ipv4.conf.all.rp_filter     = 2
net.ipv4.conf.default.rp_filter = 2

# SYN flood protection via SYN cookies (Linux default on modern kernels, but
# made explicit here so the value survives any base-image override).
net.ipv4.tcp_syncookies = 1

# Do not accept ICMP redirect messages — this host is not a router client and
# should not have its routing table altered by received ICMP redirects.
net.ipv4.conf.all.accept_redirects    = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_redirects    = 0
net.ipv6.conf.default.accept_redirects = 0

# Do not send ICMP redirects (this host is the exit-node router; it does not
# need to redirect clients — they have no alternative path to inform them of).
net.ipv4.conf.all.send_redirects    = 0
net.ipv4.conf.default.send_redirects = 0

# Reject source-routed packets (source routing is obsolete and a known attack
# vector; no legitimate traffic on this server uses it).
net.ipv4.conf.all.accept_source_route    = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv6.conf.all.accept_source_route    = 0
net.ipv6.conf.default.accept_source_route = 0

# Hide kernel symbol addresses from unprivileged users (/proc/kallsyms, etc.).
# Level 2 restricts even root (unless CAP_SYSLOG). Rootless containers running
# on this host will never need to read kernel symbol addresses.
kernel.kptr_restrict = 2

# Restrict /dev/kmsg and dmesg to root. Kernel messages can reveal memory
# addresses and other info useful for local privilege-escalation exploits.
kernel.dmesg_restrict = 1
