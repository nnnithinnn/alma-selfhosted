# Hardening drop-in. Numbered 00- so it is parsed before the distro defaults
# (sshd uses the FIRST value seen for most keywords).

# Key-only auth; no passwords, no keyboard-interactive.
PasswordAuthentication no
KbdInteractiveAuthentication no
ChallengeResponseAuthentication no
PubkeyAuthentication yes

# Root cannot log in at all (account is also locked at build time).
PermitRootLogin no

# Read authorized keys from an image-tracked path under /etc (NOT the user's
# home, which lives on the ephemeral /var in bootc and is created on first boot).
AuthorizedKeysFile /etc/ssh/authorized_keys.d/%u

# Misc hardening.
PermitEmptyPasswords no
X11Forwarding no
