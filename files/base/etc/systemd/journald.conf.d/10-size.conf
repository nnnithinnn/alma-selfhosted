# Cap the persistent journal so it cannot silently fill the NVMe on a
# long-running server. With verbose containers writing to stderr -> journald,
# an unbounded journal can consume several GB over weeks.
#
# SystemMaxUse   — hard cap on total on-disk journal size across all boots.
# SystemKeepFree — always leave at least this much free on the journal FS.
# MaxRetentionSec — drop entries older than 90 days regardless of size.
[Journal]
SystemMaxUse=300M
SystemKeepFree=1G
MaxRetentionSec=7776000
