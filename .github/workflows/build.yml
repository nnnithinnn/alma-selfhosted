---
name: Build image
on:
  pull_request:
  push:
    branches:
      - 'main'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  set-env:
    if: github.repository != 'AlmaLinux/atomic-respin-template'
    runs-on: ubuntu-latest
    outputs:
      LATEST_TAG: ${{ steps.set.outputs.LATEST_TAG }}
      REGISTRY: ${{ steps.set.outputs.REGISTRY }}
      REGISTRY_USER: ${{ steps.set.outputs.REGISTRY_USER }}
      PLATFORMS: ${{ steps.set.outputs.PLATFORMS }}
      IMAGE_PATH: ${{ steps.set.outputs.IMAGE_PATH }}
      IMAGE_NAME: ${{ steps.set.outputs.IMAGE_NAME }}
      IMAGE_REF: ${{ steps.set.outputs.IMAGE_REF }}
      IS_SIGNED: ${{ steps.set.outputs.IS_SIGNED }}
    steps:
      - name: Checkout github actions
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set environment variables
        uses: ./.github/actions/config
        id: set
        with:
          SIGNING_SECRET: ${{ secrets.SIGNING_SECRET }}

  build-image:
    name: Build image
    uses: AlmaLinux/atomic-ci/.github/workflows/build-image.yml@v11
    needs: set-env
    with:
      image-description: "Headless AlmaLinux 10 bootc host for self-hosted services"
      containerfile: Containerfile
      image-name: "${{ needs.set-env.outputs.IMAGE_NAME }}"
      previous-image: "${{ needs.set-env.outputs.IMAGE_REF }}:latest"
      upstream-public-key: almalinux-bootc.pub
      platforms: ${{ needs.set-env.outputs.PLATFORMS }}
      skip-maximize-build-space: true
      image-path: ${{ needs.set-env.outputs.IMAGE_PATH }}
      REGISTRY: ${{ needs.set-env.outputs.REGISTRY }}
      REGISTRY_USER: ${{ needs.set-env.outputs.REGISTRY_USER }}
    secrets:
      REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SIGNING_SECRET: ${{ secrets.SIGNING_SECRET }}
    permissions:
      contents: read
      packages: write
      id-token: write

  test-image:
    name: Test image
    runs-on: ubuntu-latest
    needs: [set-env, build-image]

    env:
      IMAGE_REF: "${{ needs.build-image.outputs.image-ref }}@${{ needs.build-image.outputs.digest }}"

    steps:
      - name: Login to Container Registry
        run: echo ${{ secrets.GITHUB_TOKEN }} | podman login -u ${{ needs.set-env.outputs.REGISTRY_USER }} --password-stdin ${{ needs.set-env.outputs.REGISTRY }}

      - name: Test container
        run: |
          # Create a short script to test the image using heredoc
          cat << 'EOF' > /tmp/test.sh
          set -ex

          cat /etc/os-release
          bootc -V

          # Verify helper scripts have the exec bit set (catches the most
          # common build mistake: cp preserving a non-executable source file).
          for script in \
            /usr/libexec/nextcloud-data-init.sh \
            /usr/libexec/nextcloud-data-chown.sh \
            /usr/libexec/nextcloud-apps-init.sh \
            /usr/libexec/db-secrets-init.sh \
            /usr/libexec/tailscale-authkey-init.sh; do
            test -x "$script" && echo "OK (exec): $script" \
              || { echo "NOT EXECUTABLE: $script"; exit 1; }
          done

          # Verify key config files are present and non-empty.
          for f in \
            /etc/caddy/Caddyfile \
            /etc/headscale/config.yaml \
            /etc/headscale/policy.json \
            /etc/nextcloud/hooks/post-installation/10-config.sh; do
            test -s "$f" && echo "OK (present): $f" \
              || { echo "MISSING OR EMPTY: $f"; exit 1; }
          done

          # Verify key systemd unit files exist.
          for unit in \
            /usr/lib/systemd/system/nextcloud-data-init.service \
            /usr/lib/systemd/system/nextcloud-data-chown.service \
            /usr/lib/systemd/system/tailscale-authkey.path \
            /usr/lib/systemd/system/bootc-upgrade.service \
            /usr/lib/systemd/system/bootc-upgrade.timer; do
            test -f "$unit" && echo "OK (unit): $unit" \
              || { echo "MISSING: $unit"; exit 1; }
          done
          EOF

          podman run --rm \
            -v /tmp/test.sh:/tmp/test.sh \
            ${{ env.IMAGE_REF }} \
            /bin/bash /tmp/test.sh

  promote-image:
    name: Promote image
    needs: [set-env, build-image, test-image]
    if: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    uses: AlmaLinux/atomic-ci/.github/workflows/retag-image.yml@v11
    with:
      image: ${{ needs.build-image.outputs.image-ref }}
      digest: ${{ needs.build-image.outputs.digest }}
      # Clean respin scheme. The per-arch build already pushes an immutable
      # sha-<commit> tag for every build, so the rolling pointer + the immutable
      # respin version are all we promote here:
      #   - latest                  -> rolling pointer bootc tracks
      #   - 10.2.YYYYMMDD.N (version)-> immutable respin (RHEL ver + date + seq)
      # The floating major/minor tags (10, 10.2) are intentionally NOT published:
      # they only track the base OS, not this image's app stack, and reading them
      # as "version 10" is misleading.
      tag: |
        ${{ needs.set-env.outputs.LATEST_TAG }}
        ${{ needs.build-image.outputs.version }}
      REGISTRY: ${{ needs.set-env.outputs.REGISTRY }}
      REGISTRY_USER: ${{ needs.set-env.outputs.REGISTRY_USER }}
    secrets:
      REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      packages: write
