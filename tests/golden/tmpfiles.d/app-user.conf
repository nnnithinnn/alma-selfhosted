# bootc keeps only /var persistent and wipes it of build-time content, so the
# admin user's home dir and the systemd linger marker must be (re)created on
# first boot rather than baked into the image.
# This file is written at runtime by selfhosted-configure from a template;
# @@TOKEN@@ placeholders are substituted from /etc/selfhosted/config.env.

# Home directory (base /var/home is provided by the bootc image).
d /var/home/testuser 0700 testuser testuser - -

# Enable systemd user-linger for the app user so the rootless container stack
# starts at boot without an interactive login. (loginctl enable-linger writes
# exactly this file; we create it declaratively since /var/lib is ephemeral.)
d /var/lib/systemd/linger 0755 root root - -
f /var/lib/systemd/linger/testuser 0644 root root - -
